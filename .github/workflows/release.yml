name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, openssl, zip
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: composer test:unit
      - run: composer analyse

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git-cliff needs full history

      - name: Generate changelog
        uses: orhun/git-cliff-action@v3
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: /tmp/RELEASE_NOTES.md

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, openssl, zip
          coverage: none

      - name: Install production dependencies
        run: composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader

      - name: Build ZIP
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PLUGIN_SLUG="campsflow"
          ZIP_NAME="${PLUGIN_SLUG}-${VERSION}.zip"

          rsync -av --exclude-from=.distignore . /tmp/${PLUGIN_SLUG}/

          cd /tmp
          zip -r "${ZIP_NAME}" "${PLUGIN_SLUG}/"
          echo "ZIP_PATH=/tmp/${ZIP_NAME}" >> $GITHUB_ENV
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Campsflow WP Plugin ${{ github.ref_name }}"
          body: |
            ${{ steps.cliff.outputs.content }}

            ---

            **Instalacja:** WP Admin → Pluginy → Dodaj nowy → Wyślij plugin → wybierz `${{ env.ZIP_NAME }}`

            **Aktualizacja:** pojawi się automatycznie w WP Admin → Pluginy.
          files: ${{ env.ZIP_PATH }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Release is created atomically with the ZIP attached.
          # The puc filter in campsflow.php rejects /zipball/ source archives
          # in case PUC runs before this job completes.
